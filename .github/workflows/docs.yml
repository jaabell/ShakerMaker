name: Deploy docs

on:
  push:
    branches: [master]
    paths:
      - 'docs/web/**'
      - 'mkdocs.yml'
      - 'shakermaker/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      # The package must be importable for mkdocstrings to read docstrings,
      # which means building the Fortran `shakermaker.core` extension.
      - name: Install build tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran
          python -m pip install --upgrade pip numpy scipy h5py

      - name: Install ShakerMaker (builds Fortran extension)
        run: pip install -e .

      - name: Install docs dependencies
        run: pip install -r docs/web/requirements-docs.txt

      - name: Build & deploy to gh-pages
        run: mkdocs gh-deploy --force
